name: Android CI (Compilador Automático SoundCore)

on:
  push:
    branches: [ "main", "master" ] # Escucha a ambas ramas por si las dudas
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Configurar Gradle Automático 🚀
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    - name: Compilar APK con Gradle
      run: gradle assembleDebug

    - name: Subir APK Compilado como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: SoundCore-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
