name: Android CI (Compilador Automático SoundCore)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clonar código del repositorio
      uses: actions/checkout@v4

    - name: Configurar Java JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Dar permisos de ejecución a Gradle
      run: chmod +x gradlew
      continue-on-error: true

    - name: Compilar APK con Gradle
      run: ./gradlew assembleDebug
      continue-on-error: true

    - name: Subir APK Compilado como Artefacto
      uses: actions/upload-artifact@v4
      with:
        name: SoundCore-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk
