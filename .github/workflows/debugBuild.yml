name: Nightly Universal APK

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'

concurrency:
  group: nightly-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - run: chmod +x gradlew

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v5

      # 1. Compilar en producción pura (Ultra velocidad de scroll)
      - name: Build Universal APK
        run: ./gradlew assembleUniversalRelease

      # 2. Instalar la herramienta de firmas oficial de Android en el servidor
      - name: Install Uber APK Signer
        run: |
          wget https://github.com/patrickfav/uber-apk-signer/releases/download/v1.3.0/uber-apk-signer-1.3.0.jar

      # 3. Firmar el APK usando la firma de pruebas automática en el servidor
      - name: Auto Sign APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/universal/release -name "*.apk" | head -n 1)
          java -jar uber-apk-signer-1.3.0.jar --apks "$APK_PATH" --out .
          mv app-universal-aligned-signed.apk app-universal.apk

      # 4. Subir el APK 100% firmado y optimizado
      - name: Upload Nightly
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: SoundCore Ultra Release ⚡
          prerelease: true
          files: app-universal.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
