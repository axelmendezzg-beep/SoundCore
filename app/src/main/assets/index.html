<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCore OS</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            margin: 0;
        }
        h1 { 
            color: #ff0055; 
            font-size: 2rem; 
            margin-bottom: 5px; 
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }
        p {
            color: #555;
            margin-top: 0;
            font-size: 0.9rem;
        }
        input {
            width: 100%; 
            padding: 15px; 
            background: #141414; 
            border: 1px solid #222;
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1rem;
            margin-bottom: 15px; 
            outline: none;
        }
        input:focus { 
            border-color: #ff0055; 
        }
        button {
            width: 100%; 
            padding: 15px; 
            background: #ff0055; 
            border: none;
            color: white; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1rem;
            letter-spacing: 1px;
        }
        button:active {
            background: #cc0044;
        }
        .track-card {
            display: flex; 
            align-items: center; 
            background: #141414;
            padding: 10px; 
            margin-top: 10px; 
            border-radius: 8px; 
            border: 1px solid #222;
        }
        .track-card img { 
            width: 50px; 
            height: 50px; 
            border-radius: 6px; 
            margin-right: 12px; 
            object-fit: cover;
        }
        .track-info h4 { 
            margin: 0; 
            font-size: 1rem; 
            color: #eee; 
        }
        .track-info p { 
            margin: 3px 0 0 0; 
            font-size: 0.85rem; 
            color: #888; 
        }
    </style>
</head>
<body>

    <h1>SOUNDCORE MOTOR v2</h1>
    <p>Filtro quirúrgico InnerTube activo 😈</p>

    <input type="text" id="searchBox" placeholder="Busca una rola o artista (Ej. Kanye West)...">
    <button onclick="dispararBusqueda()">BUSCAR ROLA EN VIVO 🔥</button>

    <div id="resultados" style="margin-top:20px;"></div>

<script>
    // 📩 RECEPTOR DE KOTLIN: Aquí cae la respuesta del puente nativo en Base64
    const SoundCoreResponse = {
        handle: function(callbackId, base64Data) {
            try {
                // Decodificamos el Base64 que nos mandó Kotlin
                const decodedJsonString = atob(base64Data);
                const tracks = JSON.parse(decodedJsonString);
                
                const contenedor = document.getElementById("resultados");
                contenedor.innerHTML = "";

                if (tracks.length === 0) {
                    contenedor.innerHTML = "<p style='color:#ff0055;'>No se encontraron canciones o falló la conexión.</p>";
                    return;
                }

                // Renderizamos las tarjetas dinámicamente
                tracks.forEach(track => {
                    const card = document.createElement("div");
                    card.className = "track-card";
                    card.innerHTML = `
                        <img src="${track.thumbnail}" alt="cover">
                        <div class="track-info">
                            <h4>${track.title}</h4>
                            <p>${track.artist}</p>
                        </div>
                    `;
                    contenedor.appendChild(card);
                });
            } catch (e) {
                document.getElementById("resultados").innerHTML = "<p style='color:red;'>Error al procesar datos del motor.</p>";
            }
        }
    };

    function dispararBusqueda() {
        const query = document.getElementById("searchBox").value;
        if (!query) return;
        
        document.getElementById("resultados").innerHTML = "<p style='color:#888;'>Inyectando petición al puente nativo de Android...</p>";
        
        // 🚀 PUENTE: Mandamos la query directamente al método de SoundCoreBridge.kt
        if (typeof SoundCoreNative !== 'undefined') {
            SoundCoreNative.search(query, "REQ_SEARCH_1");
        } else {
            document.getElementById("resultados").innerHTML = "<p style='color:orange;'>Error: El objeto SoundCoreNative no está inyectado.</p>";
        }
    }
</script>
</body>
</html>
