<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCore UI</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            color: #ff0055;
            font-size: 3rem;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.5);
        }
        p {
            color: #888;
            font-size: 1.2rem;
        }
        .status {
            background: #1a1a1a;
            padding: 15px 30px;
            border-radius: 50px;
            border: 1px solid #333;
            margin-top: 20px;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <h1>SOUNDCORE</h1>
    <p>By Cristopher Axel</p>
    <div class="status">CASCARÓN NATIVO COMPLETO 😈</div>
</body>
</html>
