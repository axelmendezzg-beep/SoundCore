<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #121212; color: white; font-family: sans-serif; padding: 15px; margin: 0; }
        input { width: 70%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 5px; }
        button { padding: 10px; background: #1DB954; border: none; color: white; font-weight: bold; border-radius: 5px; }
        #results { margin-top: 15px; margin-bottom: 160px; }
        .track { padding: 12px; background: #1e1e1e; margin-bottom: 8px; border-radius: 5px; cursor: pointer; }
        .track:strong { color: #1DB954; }
        #debug-console { 
            position: fixed; bottom: 0; left: 0; width: 100%; height: 140px; 
            background: #000; color: #00ff00; font-family: monospace; 
            overflow-y: scroll; font-size: 11px; padding: 8px; border-top: 2px solid #333;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <h3>SoundCore Lab 🧪</h3>
    <input type="text" id="search-input" placeholder="Buscar artista o canción...">
    <button onclick="lanzarBusqueda()">Buscar</button>

    <div id="results"></div>
    <div id="debug-console"><strong>-- Consola de Inicialización --</strong><br></div>

    <script>
        // Interceptor global de la consola para pintar en pantalla
        const consoleDiv = document.getElementById('debug-console');
        console.log = function(msg) {
            consoleDiv.innerHTML += `> ${msg}<br>`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        };

        window.onerror = function(message, source, lineno) {
            console.log(`JS Error Línea ${lineno}: ${message}`);
        };

        // Disparador de búsqueda usando el puente de búsqueda secundaria
        function lanzarBusqueda() {
            const query = document.getElementById('search-input').value;
            if(!query) return;
            const callbackId = "cb_" + Date.now();
            SoundCoreSearchBridge.search(query, callbackId);
        }

        // 🧠 Receptor Maestro de la respuesta Base64 enviado desde Kotlin
        window.SoundCoreResponse = {
            handle: function(callbackId, base64Data) {
                try {
                    const jsonString = atob(base64Data);
                    const tracks = JSON.parse(jsonString);
                    
                    const resultsDiv = document.getElementById('results');
                    resultsDiv.innerHTML = '';

                    if(tracks.length === 0) {
                        resultsDiv.innerHTML = '<p style="color:gray;">No se encontraron resultados</p>';
                        return;
                    }

                    tracks.forEach(track => {
                        const div = document.createElement('div');
                        div.className = 'track';
                        // Envía los 4 datos al puente nativo oficial (SoundCoreBridge)
                        div.onclick = () => SoundCoreNative.playTrack(track.id, track.title, track.artist, track.thumbnail || '');
                        div.innerHTML = `<strong>${track.title}</strong><br><span style="color:gray; font-size:12px;">${track.artist}</span>`;
                        resultsDiv.appendChild(div);
                    });
                    console.log(`Resultados renderizados: ${tracks.length} tracks.`);
                } catch(e) {
                    console.log("Error procesando Base64: " + e.message);
                }
            }
        };
    </script>
</body>
</html>
