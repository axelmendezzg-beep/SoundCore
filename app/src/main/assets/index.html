<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundCore Terminal</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        h1 { text-align: center; letter-spacing: 2px; font-size: 24px; margin-bottom: 20px; }
        .search-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #111; color: #fff; font-size: 16px; }
        button { padding: 12px 20px; border-radius: 8px; border: none; background: #fff; color: #000; font-weight: bold; cursor: pointer; }
        .track-item { display: flex; align-items: center; gap: 15px; background: #111; padding: 10px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; border: 1px solid #222; }
        .track-item img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
        .track-info { flex: 1; }
        .track-title { font-weight: bold; font-size: 14px; margin-bottom: 4px; }
        .track-artist { color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <h1>SOUNDCORE</h1>
    
    <div class="search-box">
        <input type="text" id="queryInput" placeholder="Busca rolas o artistas...">
        <button onclick="dispararBusqueda()">Buscar</button>
    </div>

    <div id="resultados"></div>

    <script>
        // Le grita a Kotlin que busque lo que escribiste
        function dispararBusqueda() {
            var query = document.getElementById('queryInput').value;
            if(query.trim() !== "") {
                document.getElementById('resultados').innerHTML = "<p style='color:#888; text-align:center;'>Buscando en Innertube...</p>";
                SoundCoreBridge.searchTracks(query);
            }
        }

        // Esta es la función mágica que Kotlin despierta cuando llegan los resultados
        function onSearchTracksResult(jsonString) {
            var tracks = JSON.parse(jsonString);
            var contenedor = document.getElementById('resultados');
            contenedor.innerHTML = "";

            if(tracks.length === 0) {
                contenedor.innerHTML = "<p style='color:#888; text-align:center;'>No se encontraron rolas.</p>";
                return;
            }

            tracks.forEach(function(track) {
                var div = document.createElement('div');
                div.className = 'track-item';
                // Al darle clic a cualquier canción de la lista, se manda directo al motor de audio
                div.onclick = function() {
                    SoundCoreBridge.playTrack(track.id);
                };

                div.innerHTML = `
                    <img src="${track.thumbnail}" alt="cover">
                    <div class="track-info">
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist}</div>
                    </div>
                `;
                contenedor.appendChild(div);
            });
        }
    </script>
</body>
</html>
